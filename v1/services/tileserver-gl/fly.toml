# fly.toml app configuration file generated for gftiles on 2025-05-03T13:13:58-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gftiles'
primary_region = 'iad'

[build]
dockerfile = 'tileserver-gl.Dockerfile'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1

[env]
# let React maps discover the host at runtime
TILESERVER_PUBLIC_URL = "https://gftiles.fly.dev"

[[http_service.checks]]
interval = "30s"
method = "get"
path = "/health"
