<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallformers - Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }
        h1 {
            color: #661419;
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .divider {
            width: 80px;
            height: 3px;
            background-color: #661419;
            margin: 1.5rem auto;
        }
        p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }
        .note {
            font-size: 1rem;
            color: #777;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Simplified gall wasp silhouette in maroon -->
            <ellipse cx="50" cy="55" rx="25" ry="20" fill="#661419"/>
            <ellipse cx="50" cy="35" rx="12" ry="10" fill="#661419"/>
            <circle cx="45" cy="32" r="3" fill="#f8f9fa"/>
            <circle cx="55" cy="32" r="3" fill="#f8f9fa"/>
            <!-- Wings -->
            <ellipse cx="30" cy="50" rx="18" ry="8" fill="#661419" opacity="0.6" transform="rotate(-20 30 50)"/>
            <ellipse cx="70" cy="50" rx="18" ry="8" fill="#661419" opacity="0.6" transform="rotate(20 70 50)"/>
            <!-- Antennae -->
            <path d="M42 28 Q35 15 30 10" stroke="#661419" stroke-width="2" fill="none"/>
            <path d="M58 28 Q65 15 70 10" stroke="#661419" stroke-width="2" fill="none"/>
            <!-- Legs -->
            <path d="M35 65 L25 80" stroke="#661419" stroke-width="2"/>
            <path d="M50 70 L50 85" stroke="#661419" stroke-width="2"/>
            <path d="M65 65 L75 80" stroke="#661419" stroke-width="2"/>
        </svg>
        <h1>Gallformers is Down for Maintenance</h1>
        <div class="divider"></div>
        <p>We'll be back soon!</p>
        <p>Usually these things take less than 5 minutes.</p>
        <p class="note">Thank you for your patience.</p>
    </div>
</body>
</html>
