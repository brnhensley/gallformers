<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gallformers - Temporary Outage</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(180deg, #fff7ed 0%, #fffbeb 100%);
                color: #3f3f46;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 1.5rem;
                text-align: center;
            }

            .container {
                max-width: 520px;
                width: 100%;
                background: rgba(255, 255, 255, 0.9);
                border: 1px solid #fed7aa;
                border-radius: 20px;
                padding: 2rem;
                box-shadow: 0 24px 60px rgba(124, 45, 18, 0.08);
            }

            .eyebrow {
                display: inline-block;
                margin-bottom: 0.9rem;
                padding: 0.35rem 0.7rem;
                border-radius: 999px;
                background: #ffedd5;
                color: #9a3412;
                font-size: 0.8rem;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            h1 {
                color: #7c2d12;
                font-size: 1.9rem;
                font-weight: 700;
                margin-bottom: 1rem;
            }

            p {
                font-size: 1.05rem;
                line-height: 1.65;
                margin-bottom: 0.75rem;
            }

            .subtle {
                color: #78716c;
                font-size: 0.95rem;
                margin-top: 1rem;
            }

            .image-block {
                margin-top: 1.5rem;
                width: 100%;
                max-width: 520px;
            }

            .image-block img {
                display: block;
                width: 100%;
                height: auto;
                border-radius: 18px;
                box-shadow: 0 18px 40px rgba(63, 50, 40, 0.14);
            }

            .caption {
                color: #8c5737;
                font-size: 0.9rem;
                margin-top: 0.75rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="eyebrow">Temporary Outage</div>
            <h1>Gallformers is temporarily unavailable</h1>
            <p>Something went wrong on our side and the main application is not responding.</p>
            <p>We are working to restore service as quickly as possible.</p>
            <p class="subtle">Try again in a few minutes.</p>
        </div>

        <div class="image-block">
            <img src="sad_cynipid.jpg" alt="A dejected cynipid wasp illustration for the outage page" />
        </div>
    </body>
</html>
