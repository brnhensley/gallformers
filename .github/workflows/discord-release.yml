name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to post (e.g. v2026.2.9)'
        required: true
        type: string

jobs:
  notify:
    name: Post to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Get release data
        id: release
        env:
          TAG: ${{ inputs.tag }}
          RELEASE_NAME_RAW: ${{ github.event.release.name }}
          RELEASE_URL_RAW: ${{ github.event.release.html_url }}
          RELEASE_TAG_RAW: ${{ github.event.release.tag_name }}
          RELEASE_BODY_RAW: ${{ github.event.release.body }}
        run: |
          if [ -n "$TAG" ]; then
            # Manual trigger - fetch release by tag from public API
            RELEASE=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
            if [ $? -ne 0 ]; then
              echo "::error::Release not found for tag '$TAG'"
              exit 1
            fi
            echo "name=$(echo "$RELEASE" | jq -r .name)" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$RELEASE" | jq -r .html_url)" >> "$GITHUB_OUTPUT"
            echo "tag=$(echo "$RELEASE" | jq -r .tag_name)" >> "$GITHUB_OUTPUT"

            # Body needs multiline handling
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$RELEASE" | jq -r .body >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          else
            # Release event trigger — use env vars to avoid backtick interpretation
            # (inline expansion is raw string interpolation; backticks become command substitution)
            echo "name=$RELEASE_NAME_RAW" >> "$GITHUB_OUTPUT"
            echo "url=$RELEASE_URL_RAW" >> "$GITHUB_OUTPUT"
            echo "tag=$RELEASE_TAG_RAW" >> "$GITHUB_OUTPUT"

            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$RELEASE_BODY_RAW" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          # Truncate body to fit Discord's 4096-char embed description limit
          BODY="${RELEASE_BODY:0:4000}"

          # Build Discord embed payload
          PAYLOAD=$(jq -n \
            --arg title "$RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg description "$BODY" \
            --arg tag "$RELEASE_TAG" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $description,
                color: 6689825,
                footer: { text: $tag }
              }]
            }')

          curl -f -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
