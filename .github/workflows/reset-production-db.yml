name: Reset Production Database

# This workflow replaces the production database using SFTP upload:
# 1. Downloads and validates the source database from S3
# 2. Uploads to the volume with a temporary name (app keeps running)
# 3. Switches DATABASE_PATH and redeploys
# 4. Normalizes the filename back and redeploys
#
# Much simpler than volume-swap approach. See:
# https://fly.io/docs/elixir/advanced-guides/sqlite3/#copying-an-existing-database-to-a-fly-volume

on:
  workflow_dispatch:
    inputs:
      s3_path:
        description: "S3 path to database"
        required: true
        default: "s3://gallformers-backups/reset/gallformers.sqlite"
      confirm:
        description: 'Type "RESET" to confirm'
        required: true

jobs:
  reset:
    if: github.event.inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download and validate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          sudo apt-get update && sudo apt-get install -y sqlite3
          aws s3 cp "${{ inputs.s3_path }}" /tmp/db.sqlite
          sqlite3 /tmp/db.sqlite "PRAGMA integrity_check;" | grep -q "ok"
          COUNT=$(sqlite3 /tmp/db.sqlite "SELECT COUNT(*) FROM species;")
          [ "$COUNT" -gt 5000 ] || exit 1
          echo "Validated: $COUNT species"

      - name: Upload to volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "put /tmp/db.sqlite /data/gallformers_new.sqlite" | fly sftp shell -a gallformers

      - name: Deploy with new DB path
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly secrets set DATABASE_PATH=/data/gallformers_new.sqlite -a gallformers
          fly deploy

      - name: Verify
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console -a gallformers -C "sqlite3 /data/gallformers_new.sqlite 'SELECT COUNT(*) FROM species;'"

      - name: Cleanup Litestream
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 rm s3://gallformers-backups/litestream/ --recursive

      - name: Normalize filename
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console -a gallformers -C "rm -f /data/gallformers.sqlite && mv /data/gallformers_new.sqlite /data/gallformers.sqlite"
          fly secrets unset DATABASE_PATH -a gallformers
          fly deploy
