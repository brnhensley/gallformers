name: Reset Production Database

on:
  workflow_dispatch:
    inputs:
      s3_path:
        description: 'S3 path to database (e.g., s3://gallformers-backups/reset/gallformers.sqlite)'
        required: true
        default: 's3://gallformers-backups/reset/gallformers.sqlite'
      confirm:
        description: 'Type "RESET" to confirm (this will replace the production database)'
        required: true

jobs:
  reset:
    if: github.event.inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly CLI installed
        run: flyctl version

      - name: Download and validate database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Ensure sqlite3 is available
          sudo apt-get update && sudo apt-get install -y sqlite3

          echo "Downloading from S3: ${{ inputs.s3_path }}"
          aws s3 cp "${{ inputs.s3_path }}" reset-db.sqlite

          echo "Validating database integrity..."
          RESULT=$(sqlite3 reset-db.sqlite "PRAGMA integrity_check;")
          if [ "$RESULT" != "ok" ]; then
            echo "INTEGRITY CHECK FAILED - aborting reset"
            echo "$RESULT"
            exit 1
          fi

          SPECIES_COUNT=$(sqlite3 reset-db.sqlite "SELECT COUNT(*) FROM species;")
          if [ "$SPECIES_COUNT" -lt 5000 ]; then
            echo "Sanity check failed: only $SPECIES_COUNT species (expected 5000+)"
            exit 1
          fi
          echo "Database validated: $SPECIES_COUNT species, integrity OK"

      - name: Get machine and volume info
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Getting machine ID..."
          MACHINE_ID=$(flyctl machines list -a gallformers --json | jq -r '.[0].id')
          if [ -z "$MACHINE_ID" ] || [ "$MACHINE_ID" = "null" ]; then
            echo "ERROR: No machine found"
            exit 1
          fi
          echo "MACHINE_ID=$MACHINE_ID" >> $GITHUB_ENV
          echo "Machine ID: $MACHINE_ID"

          echo "Getting volume ID..."
          VOLUME_ID=$(flyctl volumes list -a gallformers --json | jq -r '.[0].id')
          if [ -z "$VOLUME_ID" ] || [ "$VOLUME_ID" = "null" ]; then
            echo "ERROR: No volume found"
            exit 1
          fi
          echo "VOLUME_ID=$VOLUME_ID" >> $GITHUB_ENV
          echo "Volume ID: $VOLUME_ID"

      - name: Generate presigned S3 URL
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Generate a presigned URL valid for 10 minutes
          PRESIGNED_URL=$(aws s3 presign "${{ inputs.s3_path }}" --expires-in 600)
          echo "PRESIGNED_URL=$PRESIGNED_URL" >> $GITHUB_ENV
          echo "Generated presigned URL (expires in 10 min)"

      - name: Replace database via SSH
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Replacing database on running machine via SSH..."

          # Download from S3 and replace database
          flyctl ssh console -a gallformers -C "sh -c 'set -e && \
            echo Downloading database from S3... && \
            curl -sS -o /tmp/newdb.sqlite \"$PRESIGNED_URL\" && \
            echo Stopping app to release database locks... && \
            pkill -f beam.smp || true && \
            sleep 2 && \
            echo Backing up old database files... && \
            mv /data/gallformers.sqlite /data/gallformers.sqlite_BAK 2>/dev/null || true && \
            mv /data/gallformers.sqlite-wal /data/gallformers.sqlite-wal_BAK 2>/dev/null || true && \
            mv /data/gallformers.sqlite-shm /data/gallformers.sqlite-shm_BAK 2>/dev/null || true && \
            rm -rf /data/backups/* /data/.gallformers.sqlite-litestream && \
            echo Moving new database into place... && \
            mv /tmp/newdb.sqlite /data/gallformers.sqlite && \
            chmod 644 /data/gallformers.sqlite && \
            echo Database replaced: && \
            ls -la /data/'"

          echo "Restarting machine..."
          flyctl machine restart $MACHINE_ID -a gallformers

      - name: Clear old Litestream generations
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Clearing old Litestream generations for fresh start..."
          aws s3 rm s3://gallformers-backups/litestream/ --recursive || true

      - name: Wait for machine to be healthy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Waiting for machine to restart and pass health checks..."
          sleep 30
          for i in {1..30}; do
            STATE=$(flyctl machines list -a gallformers --json | jq -r '.[0].state')
            CHECKS=$(flyctl machines list -a gallformers --json | jq -r '.[0].checks[0].status // "unknown"')
            echo "Machine state: $STATE, health: $CHECKS"
            if [ "$STATE" = "started" ] && [ "$CHECKS" = "passing" ]; then
              echo "Machine healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "WARNING: Machine may not be fully healthy yet"
            fi
            sleep 5
          done

      - name: Cleanup reset file from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Cleaning up: ${{ inputs.s3_path }}"
          aws s3 rm "${{ inputs.s3_path }}"

      - name: Verify deployment
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Checking deployment status..."
          flyctl status -a gallformers
