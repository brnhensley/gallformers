name: Reset Production Database

on:
  workflow_dispatch:
    inputs:
      s3_path:
        description: 'S3 path to database (e.g., s3://gallformers-backups/reset/gallformers.sqlite)'
        required: true
        default: 's3://gallformers-backups/reset/gallformers.sqlite'
      confirm:
        description: 'Type "RESET" to confirm (this will replace the production database)'
        required: true

jobs:
  reset:
    if: github.event.inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly CLI installed
        run: flyctl version

      - name: Download and validate database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Ensure sqlite3 is available
          sudo apt-get update && sudo apt-get install -y sqlite3

          echo "Downloading from S3: ${{ inputs.s3_path }}"
          aws s3 cp "${{ inputs.s3_path }}" reset-db.sqlite

          echo "Validating database integrity..."
          RESULT=$(sqlite3 reset-db.sqlite "PRAGMA integrity_check;")
          if [ "$RESULT" != "ok" ]; then
            echo "INTEGRITY CHECK FAILED - aborting reset"
            echo "$RESULT"
            exit 1
          fi

          SPECIES_COUNT=$(sqlite3 reset-db.sqlite "SELECT COUNT(*) FROM species;")
          if [ "$SPECIES_COUNT" -lt 5000 ]; then
            echo "Sanity check failed: only $SPECIES_COUNT species (expected 5000+)"
            exit 1
          fi
          echo "Database validated: $SPECIES_COUNT species, integrity OK"

      - name: Scale down to release volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Scaling down to 0 to release volume..."
          flyctl scale count 0 -a gallformers --yes
          echo "Waiting for machines to stop..."
          sleep 15

      - name: Replace database using one-off machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
        run: |
          echo "Running one-off machine to replace database..."

          # Run alpine container with aws-cli, mount the volume, replace the DB
          flyctl machine run alpine:latest \
            -a gallformers \
            --region iad \
            --volume gallformers_data:/data \
            --env AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
            --env AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
            --env AWS_DEFAULT_REGION=us-east-1 \
            --env S3_PATH="${{ inputs.s3_path }}" \
            --restart no \
            --rm \
            -- sh -c "
              apk add --no-cache aws-cli &&
              rm -f /data/gallformers.sqlite /data/gallformers.sqlite-wal /data/gallformers.sqlite-shm &&
              rm -rf /data/backups/* &&
              aws s3 cp \$S3_PATH /data/gallformers.sqlite &&
              chmod 644 /data/gallformers.sqlite &&
              ls -la /data/ &&
              echo 'Database replaced successfully'
            "

      - name: Clear old Litestream generations
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Clearing old Litestream generations for fresh start..."
          aws s3 rm s3://gallformers-backups/litestream/ --recursive || true

      - name: Deploy and scale back up
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Deploying (runs migrations and starts Litestream)..."
          flyctl deploy --remote-only -a gallformers

      - name: Cleanup reset file from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Cleaning up: ${{ inputs.s3_path }}"
          aws s3 rm "${{ inputs.s3_path }}"

      - name: Verify deployment
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Checking deployment status..."
          flyctl status -a gallformers
