name: Reset Production Database

# This workflow replaces the production database using a volume-swap approach:
# 1. Creates a new volume
# 2. Populates it via a one-off machine
# 3. Clones the production machine with the new volume attached
# 4. Verifies the new machine is healthy and serving correct data
# 5. Destroys the old machine
# 6. Clears Litestream state for fresh replication
#
# Benefits
# - Zero downtime (old machine serves traffic until new one is ready)
# - No race conditions (old machine untouched during setup)
# - Easy rollback (destroy new machine if something goes wrong)
# - Atomic switchover

on:
  workflow_dispatch:
    inputs:
      s3_path:
        description: "S3 path to database (e.g., s3://gallformers-backups/reset/gallformers.sqlite)"
        required: true
        default: "s3://gallformers-backups/reset/gallformers.sqlite"
      confirm:
        description: 'Type "RESET" to confirm (this will replace the production database)'
        required: true
      keep_old_volume:
        description: "Keep old volume for rollback (true/false)"
        required: false
        default: "true"

jobs:
  reset:
    if: github.event.inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify prerequisites
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Verifying Fly CLI..."
          flyctl version

          echo "Verifying app access..."
          flyctl status -a gallformers

          echo "Checking current machine count..."
          MACHINE_COUNT=$(flyctl machines list -a gallformers --json | jq 'length')
          if [ "$MACHINE_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 machine, found $MACHINE_COUNT"
            echo "This workflow assumes a single-machine deployment."
            exit 1
          fi

      - name: Download and validate source database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Installing sqlite3..."
          sudo apt-get update && sudo apt-get install -y sqlite3

          echo "Downloading from S3: ${{ inputs.s3_path }}"
          aws s3 cp "${{ inputs.s3_path }}" /tmp/reset-db.sqlite

          echo "Validating database integrity..."
          RESULT=$(sqlite3 /tmp/reset-db.sqlite "PRAGMA integrity_check;")
          if [ "$RESULT" != "ok" ]; then
            echo "ERROR: INTEGRITY CHECK FAILED"
            echo "$RESULT"
            exit 1
          fi

          SPECIES_COUNT=$(sqlite3 /tmp/reset-db.sqlite "SELECT COUNT(*) FROM species;")
          if [ "$SPECIES_COUNT" -lt 5000 ]; then
            echo "ERROR: Sanity check failed - only $SPECIES_COUNT species (expected 5000+)"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s /tmp/reset-db.sqlite)
          echo "EXPECTED_SPECIES_COUNT=$SPECIES_COUNT" >> $GITHUB_ENV
          echo "EXPECTED_FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "Database validated: $SPECIES_COUNT species, ${FILE_SIZE} bytes, integrity OK"

      - name: Get current machine info
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Getting current machine details..."
          MACHINE_JSON=$(flyctl machines list -a gallformers --json | jq '.[0]')

          OLD_MACHINE_ID=$(echo "$MACHINE_JSON" | jq -r '.id')
          OLD_VOLUME_ID=$(echo "$MACHINE_JSON" | jq -r '.config.mounts[0].volume')
          REGION=$(echo "$MACHINE_JSON" | jq -r '.region')

          if [ -z "$OLD_MACHINE_ID" ] || [ "$OLD_MACHINE_ID" = "null" ]; then
            echo "ERROR: Could not get machine ID"
            exit 1
          fi

          if [ -z "$OLD_VOLUME_ID" ] || [ "$OLD_VOLUME_ID" = "null" ]; then
            echo "ERROR: Could not get volume ID"
            exit 1
          fi

          echo "OLD_MACHINE_ID=$OLD_MACHINE_ID" >> $GITHUB_ENV
          echo "OLD_VOLUME_ID=$OLD_VOLUME_ID" >> $GITHUB_ENV
          echo "REGION=$REGION" >> $GITHUB_ENV

          echo "Current machine: $OLD_MACHINE_ID"
          echo "Current volume: $OLD_VOLUME_ID"
          echo "Region: $REGION"

      - name: Create new volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Creating new volume in region $REGION..."
          VOLUME_JSON=$(flyctl volumes create gallformers_data_reset \
            -a gallformers \
            --region "$REGION" \
            --size 1 \
            --yes \
            --json)

          NEW_VOLUME_ID=$(echo "$VOLUME_JSON" | jq -r '.id')

          if [ -z "$NEW_VOLUME_ID" ] || [ "$NEW_VOLUME_ID" = "null" ]; then
            echo "ERROR: Failed to create volume"
            echo "$VOLUME_JSON"
            exit 1
          fi

          echo "NEW_VOLUME_ID=$NEW_VOLUME_ID" >> $GITHUB_ENV
          echo "Created volume: $NEW_VOLUME_ID"

      - name: Generate presigned S3 URL
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Generate a presigned URL valid for 15 minutes
          PRESIGNED_URL=$(aws s3 presign "${{ inputs.s3_path }}" --expires-in 900)
          # Store in a file to avoid shell escaping issues and log exposure
          echo "$PRESIGNED_URL" > /tmp/presigned_url.txt
          echo "Generated presigned URL (expires in 15 min)"

      - name: Populate new volume via one-off machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PRESIGNED_URL=$(cat /tmp/presigned_url.txt)

          echo "Starting one-off machine to populate volume..."

          # Use Alpine with curl and sqlite3 for minimal image
          # The machine will download the database, validate it, and exit
          flyctl machine run alpine:latest \
            -a gallformers \
            --region "$REGION" \
            --vm-size shared-cpu-1x \
            --vm-memory 512 \
            --volume "$NEW_VOLUME_ID:/data" \
            --rm \
            --restart no \
            --entrypoint sh \
            -- -c "
              set -e
              echo 'Installing dependencies...'
              apk add --no-cache curl sqlite

              echo 'Downloading database from S3...'
              curl -sfS -o /data/gallformers.sqlite '$PRESIGNED_URL'

              echo 'Validating integrity...'
              RESULT=\$(sqlite3 /data/gallformers.sqlite 'PRAGMA integrity_check;')
              if [ \"\$RESULT\" != 'ok' ]; then
                echo 'ERROR: Integrity check failed'
                exit 1
              fi

              echo 'Setting permissions...'
              chmod 644 /data/gallformers.sqlite

              echo 'Database ready:'
              ls -la /data/
              sqlite3 /data/gallformers.sqlite 'SELECT COUNT(*) FROM species;'
            "

          echo "Volume populated successfully"

      - name: Clone production machine with new volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Cloning machine $OLD_MACHINE_ID with new volume $NEW_VOLUME_ID..."

          # Clone the existing machine but attach our new volume instead
          # Don't capture output - let it stream naturally for better debugging
          flyctl machine clone "$OLD_MACHINE_ID" \
            -a gallformers \
            --attach-volume "$NEW_VOLUME_ID:/data" \
            --region "$REGION"

          echo "Clone command completed, finding new machine ID..."

          # Query machine list to find the new machine (the one that isn't the old one)
          # Use "== $old | not" instead of "!=" to avoid shell escaping issues
          NEW_MACHINE_ID=$(flyctl machines list -a gallformers --json | \
            jq -r --arg old "$OLD_MACHINE_ID" '.[] | select(.id == $old | not) | .id' | head -1)

          if [ -z "$NEW_MACHINE_ID" ] || [ "$NEW_MACHINE_ID" = "null" ]; then
            echo "ERROR: Could not determine new machine ID"
            echo "Current machines:"
            flyctl machines list -a gallformers
            exit 1
          fi

          echo "NEW_MACHINE_ID=$NEW_MACHINE_ID" >> $GITHUB_ENV
          echo "Created new machine: $NEW_MACHINE_ID"

      - name: Wait for new machine to be healthy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Waiting for machine $NEW_MACHINE_ID to be healthy..."

          MAX_ATTEMPTS=60
          SLEEP_SECONDS=5

          for i in $(seq 1 $MAX_ATTEMPTS); do
            MACHINE_JSON=$(flyctl machines list -a gallformers --json | \
              jq --arg id "$NEW_MACHINE_ID" '.[] | select(.id == $id)')

            STATE=$(echo "$MACHINE_JSON" | jq -r '.state')
            # Get all health check statuses
            CHECKS=$(echo "$MACHINE_JSON" | jq -r '.checks // [] | map(.status) | join(",")')

            echo "Attempt $i/$MAX_ATTEMPTS: state=$STATE, checks=$CHECKS"

            if [ "$STATE" = "started" ]; then
              # Check if all health checks are passing (use "== | not" to avoid shell escaping issues with "!=")
              FAILING=$(echo "$MACHINE_JSON" | jq '[.checks // [] | .[] | select(.status == "passing" | not)] | length')
              if [ "$FAILING" = "0" ]; then
                echo "Machine is healthy!"
                break
              fi
            fi

            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "ERROR: Machine failed to become healthy after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
              echo "Final state: $STATE"
              echo "Check statuses: $CHECKS"
              echo ""
              echo "Rolling back: destroying new machine..."
              flyctl machine destroy "$NEW_MACHINE_ID" -a gallformers --force || true
              exit 1
            fi

            sleep $SLEEP_SECONDS
          done

      - name: Verify database content on new machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Verifying database content on new machine..."

          # SSH to new machine and check species count
          # Use tail -1 to skip flyctl's informational messages (e.g., "Only one machine available...")
          ACTUAL_COUNT=$(flyctl ssh console -a gallformers \
            -s -C "sqlite3 /data/gallformers.sqlite 'SELECT COUNT(*) FROM species;'" \
            2>/dev/null | tail -1 | tr -d '[:space:]')

          echo "Expected species count: $EXPECTED_SPECIES_COUNT"
          echo "Actual species count: $ACTUAL_COUNT"

          if [ "$ACTUAL_COUNT" != "$EXPECTED_SPECIES_COUNT" ]; then
            echo "ERROR: Species count mismatch!"
            echo "Rolling back: destroying new machine..."
            flyctl machine destroy "$NEW_MACHINE_ID" -a gallformers --force || true
            exit 1
          fi

          echo "Database content verified successfully"

      - name: Clear old Litestream generations
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Clearing old Litestream generations for fresh replication..."
          if ! aws s3 rm s3://gallformers-backups/litestream/ --recursive; then
            echo "WARNING: Failed to clear Litestream generations"
            echo "Manual cleanup may be required"
          fi
          echo "Litestream state cleared"

      - name: Destroy old machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Destroying old machine $OLD_MACHINE_ID..."
          flyctl machine destroy "$OLD_MACHINE_ID" -a gallformers --force

          echo "Old machine destroyed"

      - name: Handle old volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ "${{ inputs.keep_old_volume }}" = "true" ]; then
            echo "Keeping old volume $OLD_VOLUME_ID for rollback"
            echo ""
            echo "To rollback manually:"
            echo "  1. flyctl machine clone <new_machine_id> --attach-volume $OLD_VOLUME_ID:/data"
            echo "  2. Verify new machine is healthy"
            echo "  3. flyctl machine destroy <current_machine_id>"
            echo ""
            echo "To delete the old volume later:"
            echo "  flyctl volumes destroy $OLD_VOLUME_ID -a gallformers"
          else
            echo "Destroying old volume $OLD_VOLUME_ID..."
            flyctl volumes destroy "$OLD_VOLUME_ID" -a gallformers --yes
            echo "Old volume destroyed"
          fi

      - name: Cleanup source file from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "Moving source file to processed location..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 mv "${{ inputs.s3_path }}" \
            "s3://gallformers-backups/reset/processed/gallformers-$TIMESTAMP.sqlite"
          echo "Source file archived (not deleted, for safety)"

      - name: Final verification
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "=== Final Status ==="
          flyctl status -a gallformers
          echo ""

          echo "=== Current Machines ==="
          flyctl machines list -a gallformers
          echo ""

          echo "=== Current Volumes ==="
          flyctl volumes list -a gallformers
          echo ""

          echo "=== Health Check ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gallformers.fly.dev/health || echo "failed")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health endpoint: OK (200)"
          else
            echo "WARNING: Health endpoint returned: $HTTP_STATUS"
          fi
          echo ""

          echo "=== Reset Complete ==="
          echo "New machine ID: $NEW_MACHINE_ID"
          echo "New volume ID: $NEW_VOLUME_ID"
          if [ "${{ inputs.keep_old_volume }}" = "true" ]; then
            echo "Old volume (for rollback): $OLD_VOLUME_ID"
          fi
