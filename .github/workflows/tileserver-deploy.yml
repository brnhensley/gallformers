name: Tileserver GL Deploy
on:
    push:
        branches:
            - main
        paths:
            - 'flyio/tileserver-gl/**'

jobs:
    deploy:
        name: Deploy Tileserver GL
        runs-on: ubuntu-latest
        concurrency: tileserver-deploy-group
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build boundaries.mbtiles
              working-directory: flyio/tileserver-gl
              run: |
                  chmod +x build_boundaries.sh
                  ./build_boundaries.sh boundaries.mbtiles

            - name: Build and push Docker image
              working-directory: flyio/tileserver-gl
              run: |
                  docker build -t gftiles -f tileserver-gl.Dockerfile .

            - name: Install flyctl
              uses: superfly/flyctl-actions/setup-flyctl@master

            - name: Deploy to fly.io
              working-directory: flyio/tileserver-gl
              run: flyctl deploy --remote-only
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
