name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: ['**']

env:
    YARN_ENABLE_IMMUTABLE_INSTALLS: false
    YARN_NODE_LINKER: node-modules
    YARN_VERSION: '4.9.2'
    YARN_BINARY_PATH: '.yarn/releases/yarn-4.9.2.cjs'

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '21'
                  cache: 'npm'

            - name: Setup Yarn
              run: |
                  echo "Creating .yarn/releases directory..."
                  mkdir -p .yarn/releases
                  echo "Downloading Yarn binary..."
                  curl -L --fail -o ${{ env.YARN_BINARY_PATH }} https://repo.yarnpkg.com/${{ env.YARN_VERSION }}/packages/yarnpkg-cli/bin/yarn.js
                  echo "Setting permissions..."
                  chmod +x ${{ env.YARN_BINARY_PATH }}
                  echo "Verifying file exists and is executable..."
                  ls -la ${{ env.YARN_BINARY_PATH }}
                  echo "Testing Yarn version..."
                  node ${{ env.YARN_BINARY_PATH }} --version
                  echo "Verifying Yarn binary integrity..."
                  if [ ! -s ${{ env.YARN_BINARY_PATH }} ]; then
                    echo "Error: Yarn binary is empty or not downloaded properly"
                    exit 1
                  fi
                  echo "Setting up Yarn configuration..."
                  node ${{ env.YARN_BINARY_PATH }} config set enableGlobalCache false
                  node ${{ env.YARN_BINARY_PATH }} config set nodeLinker node-modules

            - name: Cache Yarn dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/yarn
                      node_modules
                      .yarn/cache
                      .yarn/unplugged
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Install dependencies
              run: |
                  echo "Installing dependencies with explicit environment variables..."
                  YARN_ENABLE_IMMUTABLE_INSTALLS=false YARN_NODE_LINKER=node-modules node ${{ env.YARN_BINARY_PATH }} install --immutable

            - name: Type check
              run: yarn tsc --project tsconfig.ci.json --noEmit

            - name: Lint
              run: |
                  echo "Testing Yarn binary before lint..."
                  node ${{ env.YARN_BINARY_PATH }} --version
                  node ${{ env.YARN_BINARY_PATH }} lint

            - name: Generate Prisma Client
              run: |
                  echo "Testing Yarn binary before generate..."
                  node ${{ env.YARN_BINARY_PATH }} --version
                  node ${{ env.YARN_BINARY_PATH }} generate

            - name: Run database migrations
              run: |
                  echo "Testing Yarn binary before migrate..."
                  node ${{ env.YARN_BINARY_PATH }} --version
                  node ${{ env.YARN_BINARY_PATH }} migrate
              env:
                  DATABASE_URL: 'file:./test.db'

            - name: Run tests
              run: |
                  echo "Testing Yarn binary before test..."
                  node ${{ env.YARN_BINARY_PATH }} --version
                  node ${{ env.YARN_BINARY_PATH }} test --coverage
              env:
                  CI: true
                  DATABASE_URL: 'file:./test.db'

            - name: Upload test coverage
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage
                  path: .coverage/
                  retention-days: 7
