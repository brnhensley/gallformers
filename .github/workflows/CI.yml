name: CI
on: [push, pull_request]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '18'
            - name: Install Yarn
              run: |
                  corepack enable
                  corepack prepare yarn@4.7.0 --activate
            - name: Install modules
              run: yarn install --immutable
            - name: Gen DB Client
              run: yarn generate
            - name: Run tests
              run: yarn test
            - name: Type Coverage
              run: yarn type-coverage
