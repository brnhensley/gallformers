name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: ['**']

env:
    YARN_ENABLE_IMMUTABLE_INSTALLS: false
    YARN_NODE_LINKER: node-modules

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '21'
                  cache: 'npm'

            - name: Setup Yarn
              run: |
                  echo "Creating .yarn/releases directory..."
                  mkdir -p .yarn/releases
                  echo "Downloading Yarn binary..."
                  curl -L --fail -o .yarn/releases/yarn-4.7.0.cjs https://repo.yarnpkg.com/4.7.0/packages/yarnpkg-cli/bin/yarn.js
                  echo "Setting permissions..."
                  chmod +x .yarn/releases/yarn-4.7.0.cjs
                  echo "Verifying file exists and is executable..."
                  ls -la .yarn/releases/yarn-4.7.0.cjs
                  echo "Testing Yarn version..."
                  node .yarn/releases/yarn-4.7.0.cjs --version
                  echo "Verifying Yarn binary integrity..."
                  if [ ! -s .yarn/releases/yarn-4.7.0.cjs ]; then
                    echo "Error: Yarn binary is empty or not downloaded properly"
                    exit 1
                  fi

            - name: Get yarn cache directory path
              id: yarn-cache-dir-path
              run: |
                  echo "Testing Yarn binary before getting cache path..."
                  node .yarn/releases/yarn-4.7.0.cjs --version
                  echo "Getting cache path..."
                  echo "dir=$(node .yarn/releases/yarn-4.7.0.cjs config get cacheFolder)" >> $GITHUB_OUTPUT

            - name: Cache Yarn dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ${{ steps.yarn-cache-dir-path.outputs.dir }}
                      node_modules
                      .yarn/cache
                      .yarn/unplugged
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Install dependencies
              run: node .yarn/releases/yarn-4.7.0.cjs install --immutable

            - name: Type check
              run: yarn tsc --project tsconfig.ci.json --noEmit

            - name: Lint
              run: |
                  echo "Testing Yarn binary before lint..."
                  node .yarn/releases/yarn-4.7.0.cjs --version
                  node .yarn/releases/yarn-4.7.0.cjs lint

            - name: Generate Prisma Client
              run: |
                  echo "Testing Yarn binary before generate..."
                  node .yarn/releases/yarn-4.7.0.cjs --version
                  node .yarn/releases/yarn-4.7.0.cjs generate

            - name: Run database migrations
              run: |
                  echo "Testing Yarn binary before migrate..."
                  node .yarn/releases/yarn-4.7.0.cjs --version
                  node .yarn/releases/yarn-4.7.0.cjs migrate
              env:
                  DATABASE_URL: 'file:./test.db'

            - name: Run tests
              run: |
                  echo "Testing Yarn binary before test..."
                  node .yarn/releases/yarn-4.7.0.cjs --version
                  node .yarn/releases/yarn-4.7.0.cjs test --coverage
              env:
                  CI: true
                  DATABASE_URL: 'file:./test.db'

            - name: Upload test coverage
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage
                  path: .coverage/
                  retention-days: 7
