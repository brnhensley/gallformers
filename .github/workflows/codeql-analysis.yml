# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
name: 'CodeQL'

on:
    push:
        branches: [main]
        paths:
            - 'v1/pages/**'
            - 'v1/components/**'
            - 'v1/libs/**'
            - 'v1/hooks/**'
            - 'v1/layouts/**'
            - 'v1/__tests__/**'
    pull_request:
        branches: [main]
        paths:
            - 'v1/pages/**'
            - 'v1/components/**'
            - 'v1/libs/**'
            - 'v1/hooks/**'
            - 'v1/layouts/**'
            - 'v1/__tests__/**'
    schedule:
        - cron: '0 15 * * 5'

defaults:
    run:
        working-directory: v1

env:
    YARN_ENABLE_IMMUTABLE_INSTALLS: false
    YARN_NODE_LINKER: node-modules

jobs:
    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write

        strategy:
            fail-fast: false
            matrix:
                # Updated to include typescript for better analysis of your codebase
                # CodeQL supports 'javascript' for both JavaScript and TypeScript
                language: ['javascript']

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # Initializes the CodeQL tools for scanning.
            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  # Enable additional queries for better security analysis
                  queries: security-extended,security-and-quality

            # Set up Node.js environment for proper TypeScript/Next.js analysis
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '21'

            # Setup Yarn 4 (same approach as CI.yml)
            - name: Setup Yarn
              run: |
                  echo "Creating .yarn/releases directory..."
                  mkdir -p .yarn/releases
                  echo "Downloading Yarn binary..."
                  curl -L --fail -o .yarn/releases/yarn-4.9.2.cjs https://repo.yarnpkg.com/4.9.2/packages/yarnpkg-cli/bin/yarn.js
                  echo "Setting permissions..."
                  chmod +x .yarn/releases/yarn-4.9.2.cjs
                  echo "Verifying file exists and is executable..."
                  ls -la .yarn/releases/yarn-4.9.2.cjs
                  echo "Testing Yarn version..."
                  node .yarn/releases/yarn-4.9.2.cjs --version

            # Install dependencies to help CodeQL understand the project structure
            - name: Install dependencies
              run: yarn install --immutable

            # Generate Prisma client for proper analysis
            - name: Generate Prisma client
              run: yarn generate

            # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
            # For JavaScript/TypeScript, this step analyzes the code without building
            - name: Autobuild
              uses: github/codeql-action/autobuild@v4

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: '/language:${{matrix.language}}'
