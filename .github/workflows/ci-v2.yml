name: CI V2

on:
  push:
    branches: [main]
    paths: ['v2/**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
        env:
          DATABASE_PATH: ../testdata/seed.sqlite

      - name: Build
        run: go build ./cmd/server

  web:
    name: Svelte Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
