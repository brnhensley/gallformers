name: CI V2

on:
  push:
    branches: [main, adopt-phoenix-liveview]
    paths:
      - 'v2/**'
      - '!v2/**/*.md'
      - '!v2/docs/**'
      - '!v2/runbooks/**'
  pull_request:
    paths:
      - 'v2/**'
      - '!v2/**/*.md'
      - '!v2/docs/**'
      - '!v2/runbooks/**'
  workflow_dispatch:

concurrency:
  group: ci-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phoenix:
    name: Phoenix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            v2/deps
            v2/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('v2/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Check code quality (Credo)
        run: mix credo --strict
        continue-on-error: true

  assets:
    name: Assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            v2/deps
            v2/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('v2/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Build assets
        run: mix assets.deploy
