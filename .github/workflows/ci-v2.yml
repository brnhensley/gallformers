name: CI V2

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '!v2/**/*.md'
      - '!v2/docs/**'
      - '!v2/runbooks/**'
  pull_request:
    paths:
      - 'v2/**'
      - '!v2/**/*.md'
      - '!v2/docs/**'
      - '!v2/runbooks/**'
  workflow_dispatch:

concurrency:
  group: ci-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
        env:
          DATABASE_PATH: ../testdata/seed.sqlite

      - name: Build
        run: go build ./cmd/server

  web:
    name: Svelte Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
