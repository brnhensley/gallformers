# Gallformers Preview - Fly.io Configuration
# Disposable preview instance with baked-in database (no volumes)
# Deploy with: make preview

app = "gallformers-preview"
primary_region = "iad"

kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile.preview"

[env]
  PHX_HOST = "gallformers-preview.fly.dev"
  PORT = "4000"
  S3_IMAGE_PREFIX = "preview"
  PREVIEW_DEPLOY = "true"
  ECTO_IPV6 = "true"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "120s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "gallformers_preview_data"
  destination = "/data"
