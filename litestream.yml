dbs:
  - path: /data/gallformers.sqlite
    replicas:
      - type: s3
        bucket: gallformers-backups
        path: litestream
        region: us-east-1
        sync-interval: 5s
        snapshot-interval: 24h
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
