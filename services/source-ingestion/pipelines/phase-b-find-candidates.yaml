# phase-b-find-candidates — iteration config for the real find-candidates
# prompt while the other LLM stages still use their stubs.
#
# Purpose: test prompt-quality changes to prompts/find-candidates.md in
# isolation. Bundle/manifest still produce so we can inspect candidate
# lists end-to-end without prompt drift in other stages confusing the
# signal.
#
# When find-candidates is ready, move on to the next Phase B stage
# (extract-facts) by adding another pipeline like this one.

pipeline:
  name: phase-b-find-candidates
  schema_version: 1.0.0
  seed: 42

  defaults:
    idle_timeout_s: 60
    total_timeout_s: 300
    retry_on_idle: 1
    max_workers: 2
    structured_output: true

  stages:
    - step: extract
      extractor: pymupdf

    - step: preprocess
      ops:
        - strip_bhl_boilerplate
        - strip_plate_pages
        - strip_page_headers
        - rejoin_hyphenated
        - rejoin_lines

    - step: sectionize
      excluded_section_types: [references, bibliography, literature_cited]

    - step: metadata
      model: deepinfra/Qwen/Qwen2.5-72B-Instruct
      prompt: prompts/stubs/metadata.md
      input_section_types: [title, abstract, introduction]

    # ── The stage under iteration ────────────────────────────────────────
    - step: find-candidates
      # Phase B departure from the matter (which calls for Llama-3.1-8B):
      # Llama proved unable to follow nuanced inclusion rules — it
      # consistently dropped comparison/reference species mentions even
      # with explicit prompt anti-patterns. DeepSeek-V4-Flash gives us
      # 1M-token context (handles any paper without chunking) and strong
      # reasoning at ~$0.03/Cuesta-call (n=3). Same DeepSeek family as
      # the verifier — fine, because the different-family principle is
      # extractor-vs-verifier, not find-candidates-vs-anything.
      model: deepinfra/deepseek-ai/DeepSeek-V4-Flash
      prompt: prompts/find-candidates.md
      n_samples: 3                 # production self-consistency: vote across 3 samples
      agreement_threshold: 2       # keep candidates appearing in >= 2 samples
      max_workers: 3               # one per sample

    - step: evidence-pack
      context_window: 1

    - step: extract-facts
      model: deepinfra/Qwen/Qwen2.5-72B-Instruct
      prompt: prompts/stubs/extract-facts.md
      max_workers: 2

    - step: verify
      substring_min_score: 90
      enrich_offsets: true

    - step: verify-claims
      model: deepinfra/Qwen/Qwen2.5-72B-Instruct
      prompt: prompts/stubs/verify-claims.md
      max_workers: 2

    - step: taxonomy-lookup
      source: gbif
      cache_dir: output/cache/gbif
      max_workers: 4
      idle_timeout_s: 30
      on_api_error: continue

    - step: assemble-review
      outputs:
        - claims.json
        - verified_claims.json
        - review_artifact.json
        - manifest.json
      validate: strict

    - step: bundle
      output: bundle.tar.gz
      include_candidates: false
      verify_complete: true
