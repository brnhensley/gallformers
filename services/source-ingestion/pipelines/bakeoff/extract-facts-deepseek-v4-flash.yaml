pipeline:
  name: bakeoff-extract-facts-deepseek-v4-flash
  schema_version: 1.0.0
  seed: 42
  defaults:
    idle_timeout_s: 60
    total_timeout_s: 300
    retry_on_idle: 1
    max_workers: 4
    structured_output: true
  stages:
  - step: extract
    extractor: pymupdf
  - step: preprocess
    ops:
    - strip_bhl_boilerplate
    - strip_plate_pages
    - strip_page_headers
    - rejoin_hyphenated
    - rejoin_lines
  - step: sectionize
    excluded_section_types:
    - references
    - bibliography
    - literature_cited
  - step: metadata
    model: deepinfra/Qwen/Qwen2.5-72B-Instruct
    prompt: prompts/stubs/metadata.md
    input_section_types:
    - title
    - abstract
    - introduction
  - step: find-candidates
    model: deepinfra/deepseek-ai/DeepSeek-V4-Flash
    prompt: prompts/find-candidates.md
    n_samples: 3
    agreement_threshold: 2
    max_workers: 3
  - step: evidence-pack
    context_window: 2
  - step: extract-facts
    model: deepinfra/deepseek-ai/DeepSeek-V4-Flash
    prompt: prompts/extract-facts.md
    max_workers: 8
    idle_timeout_s: 90
  - step: verify
    substring_min_score: 90
    enrich_offsets: true
  - step: verify-claims
    model: deepinfra/Qwen/Qwen2.5-72B-Instruct
    prompt: prompts/stubs/verify-claims.md
    max_workers: 4
  - step: taxonomy-lookup
    source: gbif
    cache_dir: output/cache/gbif
    max_workers: 4
    idle_timeout_s: 30
    on_api_error: continue
  - step: assemble-review
    outputs:
    - claims.json
    - verified_claims.json
    - review_artifact.json
    - manifest.json
    validate: strict
  - step: bundle
    output: bundle.tar.gz
    include_candidates: false
    verify_complete: true
