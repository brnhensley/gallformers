providers:
  lmstudio:
    base_url: "http://localhost:1234/v1"
    env_key: "LMSTUDIO_API_KEY"
    no_system_role: true
    models:
      - qwen3-14B
      - lek-mistral-7b-v0.3
      - gemma-3-1b
      - gemma-3-12b
      - qwen3-vl-8b
      - olmocr-2-7b
  deepinfra:
    base_url: "https://api.deepinfra.com/v1/openai"
    env_key: "DEEPINFRA_API_KEY"
    models:
      - allenai/olmOCR-2-7B-1025
      - Qwen/Qwen2.5-VL-32B-Instruct
      - MiniMaxAI/MiniMax-M2.5
      - moonshotai/Kimi-K2.5
      - deepseek-ai/DeepSeek-V3
      - Qwen/Qwen2.5-72B-Instruct
      - meta-llama/Meta-Llama-3.1-8B-Instruct   # north-star: metadata, find-candidates
  # OpenRouter — optional. Enable if you want a fully cross-provider verifier
  # setup (e.g., extractor on DeepInfra, verifier on Anthropic via OpenRouter).
  # Today's north-star pipelines achieve different-family verification within
  # DeepInfra alone (Qwen extractor + DeepSeek verifier), so OpenRouter is
  # not required for v1.
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    env_key: "OPENROUTER_API_KEY"
    models:
      - anthropic/claude-haiku-4.5
      - anthropic/claude-sonnet-4.6
      - meta-llama/llama-3.1-8b-instruct
      - qwen/qwen-2.5-72b-instruct
      - deepseek/deepseek-chat
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    env_key: "DEEPSEEK_API_KEY"
    models:
      - deepseek-chat
  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    env_key: "GEMINI_API_KEY"
    models:
      - gemini-2.5-flash
  mistral:
    base_url: "https://api.mistral.ai/v1"
    env_key: "MISTRAL_API_KEY"
    models:
      - mistral-medium-3
  moonshot:
    base_url: "https://api.moonshot.cn/v1"
    env_key: "MOONSHOT_API_KEY"
    models:
      - moonshot-v1-auto
