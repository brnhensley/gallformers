                    items:
                      $ref: '#/components/schemas/SpeciesSourceResponse'
                  - $ref: '#/components/schemas/SpeciesSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - SpeciesSources
      summary: Create a species-source relationship
      description: Creates a new species-source relationship. Requires authentication.
      operationId: createSpeciesSource
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeciesSourceCreateRequest'
      responses:
        '201':
          description: Species-source relationship created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeciesSourceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
