openapi: 3.0.3
info:
  title: Gallformers API
  version: 2.0.0
  description: |
    REST API for gallformers.org - a comprehensive database and reference guide for galls,
    the abnormal plant growths caused by insects, mites, and other organisms.

    ## Authentication

    Most read endpoints are public. Write operations (POST, PUT, DELETE) require authentication
    via Auth0 JWT token stored in an httpOnly cookie.

    ## Rate Limiting

    No rate limiting is currently implemented.
  contact:
    name: Gallformers
    url: https://gallformers.org
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://gallformers.fly.dev
    description: Staging server (Fly.io)
  - url: https://gallformers.org
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Galls
    description: Gall species management
  - name: Hosts
    description: Host plant management
  - name: Species
    description: Generic species queries
  - name: Taxonomy
    description: Taxonomic hierarchy management
  - name: Sources
    description: Reference and citation management
  - name: Glossary
    description: Glossary term management
  - name: Places
    description: Geographic location management
  - name: Search
    description: Global search functionality
  - name: Auth
    description: Authentication endpoints

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: |
        Auth0 JWT token stored in httpOnly cookie. Set after successful login
        via the /api/v2/auth/callback endpoint.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: NOT_FOUND
            message:
              type: string
              description: Human-readable error message
              example: Gall with ID 123 not found
          required:
            - code
            - message
      required:
        - error

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: Overall health status
        database:
          type: string
          enum: [connected, unavailable]
          description: Database connection status
      required:
        - status
        - database

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
          description: Array of results
        total:
          type: integer
          description: Total number of results available
        limit:
          type: integer
          description: Maximum results returned
        offset:
          type: integer
          description: Number of results skipped

  parameters:
    limitParam:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    offsetParam:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        minimum: 0
        default: 0
    searchParam:
      name: q
      in: query
      description: Search term
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: BAD_REQUEST
              message: Invalid request parameters
    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: No auth token
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: Super admin required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
    ServiceUnavailable:
      description: Service unavailable - database busy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: SERVICE_UNAVAILABLE
              message: Database is busy, please retry

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: |
        Returns the health status of the API including database connectivity.
        Returns 200 if healthy, 503 if database is unavailable.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                database: connected
        '503':
          description: Service is degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: degraded
                database: unavailable

  # Placeholder paths - domain endpoints will be added as they are implemented
  # See tasks.md sections 5-15 for planned endpoints
