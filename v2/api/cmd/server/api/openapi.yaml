  # Global Search endpoint

  /api/v2/search:
    get:
      tags:
        - Search
      summary: Global search across all entity types
      description: |
        Searches across species (including aliases), glossary entries, sources,
        taxonomy (genus, section, family), and places. Returns grouped results
        for each entity type.

        Species results include their aliases. Glossary matches on exact word or
        definition containing the search term. Sources match on title or author.
        Taxa match on name or description. Places match on name or code.
      operationId: globalSearch
      parameters:
        - name: q
          in: query
          required: true
          description: Search term (spaces are converted to wildcards)
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Search results grouped by entity type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalSearchResponse'
              example:
                species:
                  - id: 123
                    name: "Andricus quercuscalifornicus"
                    taxoncode: "gall"
                    aliases: ["California gall wasp"]
                glossary:
                  - id: 45
                    word: "gall"
                    definition: "An abnormal plant growth induced by an organism"
                sources:
                  - id: 67
                    source: "Smith, 2020. Gall Biology"
                taxa:
                  - id: 89
                    name: "Quercus"
                    description: "Oak genus"
                    type: "genus"
                places:
                  - id: 12
                    name: "California"
                    code: "CA"
                    type: "state"
        '400':
          $ref: '#/components/responses/BadRequest'
