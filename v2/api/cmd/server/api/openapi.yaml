openapi: 3.0.3
info:
  title: Gallformers API
  version: 2.0.0
  description: |
    REST API for gallformers.org - a comprehensive database and reference guide for galls,
    the abnormal plant growths caused by insects, mites, and other organisms.

    ## Authentication

    Most read endpoints are public. Write operations (POST, PUT, DELETE) require authentication
    via Auth0 JWT token stored in an httpOnly cookie.

    ## Rate Limiting

    No rate limiting is currently implemented.
  contact:
    name: Gallformers
    url: https://gallformers.org
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://gallformers.fly.dev
    description: Staging server (Fly.io)
  - url: https://gallformers.org
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Galls
    description: Gall species management
  - name: Hosts
    description: Host plant management
  - name: Species
    description: Generic species queries
  - name: Taxonomy
    description: Taxonomic hierarchy management
  - name: Sources
    description: Reference and citation management
  - name: Glossary
    description: Glossary term management
  - name: Places
    description: Geographic location management
  - name: Search
    description: Global search functionality
  - name: Auth
    description: Authentication endpoints

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: |
        Auth0 JWT token stored in httpOnly cookie. Set after successful login
        via the /api/v2/auth/callback endpoint.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: NOT_FOUND
            message:
              type: string
              description: Human-readable error message
              example: Gall with ID 123 not found
          required:
            - code
            - message
      required:
        - error

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: Overall health status
        database:
          type: string
          enum: [connected, unavailable]
          description: Database connection status
      required:
        - status
        - database

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
          description: Array of results
        total:
          type: integer
          description: Total number of results available
        limit:
          type: integer
          description: Maximum results returned
        offset:
          type: integer
          description: Number of results skipped

    Species:
      type: object
      description: A species record (gall-forming organism or host plant)
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
          example: 1234
        name:
          type: string
          description: Scientific name
          example: "Andricus quercuscalifornicus"
        taxoncode:
          type: string
          nullable: true
          description: Type of taxon (gall, plant, etc.)
          example: "gall"
        datacomplete:
          type: boolean
          description: Whether data for this species is considered complete
          example: false
        abundance_id:
          type: integer
          format: int64
          nullable: true
          description: Reference to abundance level
          example: 2
        abundance:
          type: string
          nullable: true
          description: Abundance level name
          example: "common"
      required:
        - id
        - name
        - datacomplete

    SpeciesListResponse:
      type: object
      description: Paginated list of species
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Species'
        total:
          type: integer
          format: int64
          description: Total number of species matching query
        limit:
          type: integer
          nullable: true
          description: Limit applied to results (if any)
        offset:
          type: integer
          description: Offset applied to results
      required:
        - data
        - total
        - offset

    Alias:
      type: object
      description: An alias (alternative name) for a species
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: The alias name
        type:
          type: string
          enum: [common, scientific]
          description: Type of alias
        description:
          type: string
          description: Optional description of the alias
      required:
        - id
        - name
        - type
        - description

    FilterField:
      type: object
      description: A filter field value (color, shape, texture, etc.)
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        field:
          type: string
          description: The field value
        description:
          type: string
          nullable: true
          description: Optional description
      required:
        - id
        - field

    Host:
      type: object
      description: A host plant for a gall
      properties:
        id:
          type: integer
          format: int64
          description: Species ID of the host
        name:
          type: string
          description: Name of the host species
      required:
        - id
        - name

    Gall:
      type: object
      description: A gall species with all associated data
      properties:
        id:
          type: integer
          format: int64
          description: Species ID
        name:
          type: string
          description: Scientific name
        gall_id:
          type: integer
          format: int64
          description: Gall table ID
        datacomplete:
          type: boolean
          description: Whether data is complete
        abundance_id:
          type: integer
          format: int64
          nullable: true
          description: Abundance level ID
        detachable:
          type: integer
          nullable: true
          description: Detachability value (0=none, 1=integral, 2=detachable, 3=both)
        undescribed:
          type: boolean
          description: Whether this is an undescribed species
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/Alias'
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/Host'
        colors:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        shapes:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        textures:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        alignments:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        walls:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        cells:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        seasons:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
        forms:
          type: array
          items:
            $ref: '#/components/schemas/FilterField'
      required:
        - id
        - name
        - gall_id
        - datacomplete
        - undescribed
        - aliases

    GallListResponse:
      type: object
      description: Paginated list of galls
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Gall'
        total:
          type: integer
          format: int64
          description: Total number of galls matching query
        limit:
          type: integer
          nullable: true
          description: Limit applied to results (if any)
        offset:
          type: integer
          description: Offset applied to results
      required:
        - data
        - total
        - offset

    GallCreateRequest:
      type: object
      description: Request body for creating a gall
      properties:
        name:
          type: string
          description: Scientific name (required)
        datacomplete:
          type: boolean
          description: Whether data is complete
        abundance_id:
          type: integer
          format: int64
          nullable: true
        detachable:
          type: integer
          nullable: true
          description: Detachability value
        undescribed:
          type: boolean
        aliases:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
                enum: [common, scientific]
              description:
                type: string
        hosts:
          type: array
          items:
            type: integer
            format: int64
          description: Array of host species IDs
        colors:
          type: array
          items:
            type: integer
            format: int64
        shapes:
          type: array
          items:
            type: integer
            format: int64
        textures:
          type: array
          items:
            type: integer
            format: int64
        locations:
          type: array
          items:
            type: integer
            format: int64
        alignments:
          type: array
          items:
            type: integer
            format: int64
        walls:
          type: array
          items:
            type: integer
            format: int64
        cells:
          type: array
          items:
            type: integer
            format: int64
        seasons:
          type: array
          items:
            type: integer
            format: int64
        forms:
          type: array
          items:
            type: integer
            format: int64
      required:
        - name

    GallUpdateRequest:
      type: object
      description: Request body for updating a gall
      properties:
        name:
          type: string
          description: Scientific name (required)
        datacomplete:
          type: boolean
        abundance_id:
          type: integer
          format: int64
          nullable: true
        detachable:
          type: integer
          nullable: true
        undescribed:
          type: boolean
        aliases:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
                enum: [common, scientific]
              description:
                type: string
        hosts:
          type: array
          items:
            type: integer
            format: int64
        colors:
          type: array
          items:
            type: integer
            format: int64
        shapes:
          type: array
          items:
            type: integer
            format: int64
        textures:
          type: array
          items:
            type: integer
            format: int64
        locations:
          type: array
          items:
            type: integer
            format: int64
        alignments:
          type: array
          items:
            type: integer
            format: int64
        walls:
          type: array
          items:
            type: integer
            format: int64
        cells:
          type: array
          items:
            type: integer
            format: int64
        seasons:
          type: array
          items:
            type: integer
            format: int64
        forms:
          type: array
          items:
            type: integer
            format: int64
      required:
        - name

  parameters:
    limitParam:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    offsetParam:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        minimum: 0
        default: 0
    searchParam:
      name: q
      in: query
      description: Search term
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: BAD_REQUEST
              message: Invalid request parameters
    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: No auth token
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: Super admin required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
    ServiceUnavailable:
      description: Service unavailable - database busy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: SERVICE_UNAVAILABLE
              message: Database is busy, please retry

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: |
        Returns the health status of the API including database connectivity.
        Returns 200 if healthy, 503 if database is unavailable.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                database: connected
        '503':
          description: Service is degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: degraded
                database: unavailable

  /api/v2/species:
    get:
      tags:
        - Species
      summary: List or search species
      description: |
        Returns a list of all species, or searches for species by name if a search term is provided.
        Results are ordered alphabetically by name.
      operationId: listSpecies
      parameters:
        - $ref: '#/components/parameters/searchParam'
      responses:
        '200':
          description: List of species
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeciesListResponse'
              examples:
                allSpecies:
                  summary: List all species
                  value:
                    data:
                      - id: 1
                        name: "Andricus quercuscalifornicus"
                        taxoncode: "gall"
                        datacomplete: false
                        abundance_id: 2
                        abundance: "common"
                    total: 3000
                    offset: 0
                searchResults:
                  summary: Search results
                  value:
                    data:
                      - id: 1
                        name: "Andricus quercuscalifornicus"
                        taxoncode: "gall"
                        datacomplete: false
                    total: 15
                    offset: 0
        '500':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v2/species/{id}:
    get:
      tags:
        - Species
      summary: Get species by ID
      description: Returns a single species by its unique identifier.
      operationId: getSpeciesById
      parameters:
        - name: id
          in: path
          required: true
          description: Species ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Species details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Species'
              example:
                id: 1234
                name: "Andricus quercuscalifornicus"
                taxoncode: "gall"
                datacomplete: false
                abundance_id: 2
                abundance: "common"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v2/galls:
    get:
      tags:
        - Galls
      summary: List or search galls
      description: |
        Returns a list of all galls, optionally filtered by search query.
        Supports pagination via limit and offset parameters.
      operationId: listGalls
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: List of galls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GallListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Galls
      summary: Create a new gall
      description: Creates a new gall species entry. Requires authentication.
      operationId: createGall
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GallCreateRequest'
      responses:
        '201':
          description: Gall created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gall'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/galls/{id}:
    get:
      tags:
        - Galls
      summary: Get a gall by ID
      description: Returns detailed information about a specific gall.
      operationId: getGallById
      parameters:
        - name: id
          in: path
          required: true
          description: The species ID of the gall
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Gall details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gall'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Galls
      summary: Update a gall
      description: Updates an existing gall. Requires authentication.
      operationId: updateGall
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The species ID of the gall
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GallUpdateRequest'
      responses:
        '200':
          description: Gall updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gall'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Galls
      summary: Delete a gall
      description: Deletes a gall and all associated data. Requires authentication.
      operationId: deleteGall
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The species ID of the gall
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Gall deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Placeholder paths - additional domain endpoints will be added as they are implemented
  # See tasks.md sections 6-15 for planned endpoints
