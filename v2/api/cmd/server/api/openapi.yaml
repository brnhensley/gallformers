  # Taxonomy endpoints

  /api/v2/taxonomy:
    get:
      tags:
        - Taxonomy
      summary: Get taxonomy for species or by name
      description: |
        Returns taxonomy data. Must provide either `id` (species ID to get FGS) or `name` (exact match).
      operationId: getTaxonomy
      parameters:
        - name: id
          in: query
          description: Species ID to get Family-Genus-Section (FGS)
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: Exact taxonomy name match
          schema:
            type: string
      responses:
        '200':
          description: Taxonomy data
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FGS'
                  - type: array
                    items:
                      $ref: '#/components/schemas/TaxonomyEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Taxonomy
      summary: Create or update taxonomy entry
      description: Creates or updates a taxonomy entry. Requires authentication.
      operationId: upsertTaxonomy
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxonomyUpsertRequest'
      responses:
        '200':
          description: Taxonomy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxonomyEntry'
        '201':
          description: Taxonomy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxonomyEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/taxonomy/{id}:
    get:
      tags:
        - Taxonomy
      summary: Get taxonomy entry by ID
      description: Returns a single taxonomy entry by its ID.
      operationId: getTaxonomyById
      parameters:
        - name: id
          in: path
          required: true
          description: Taxonomy ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Taxonomy entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxonomyEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Taxonomy
      summary: Delete taxonomy entry
      description: Deletes a taxonomy entry. If family, cascades to genera and species. Requires authentication.
      operationId: deleteTaxonomy
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Taxonomy ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Taxonomy deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v2/taxonomy/families:
    get:
      tags:
        - Taxonomy
      summary: List or search families
      description: |
        Returns a list of families. Supports filtering by:
        - `familyid`: Get family by ID
        - `name`: Get family by exact name
        - `q`: Search families by name pattern
      operationId: listFamilies
      parameters:
        - name: familyid
          in: query
          description: Family ID
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: Exact family name
          schema:
            type: string
        - $ref: '#/components/parameters/searchParam'
      responses:
        '200':
          description: List of families
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TaxonomyListResponse'
                  - type: array
                    items:
                      $ref: '#/components/schemas/FamilyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Taxonomy
      summary: Create or update family
      description: Creates or updates a family with optional genera. Requires authentication.
      operationId: upsertFamily
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyUpsertRequest'
      responses:
        '200':
          description: Family updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyResponse'
        '201':
          description: Family created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

