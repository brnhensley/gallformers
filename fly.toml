# Gallformers - Fly.io Configuration (Phoenix)
# Deploy with: fly deploy

app = "gallformers"
primary_region = "iad"

kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_HOST = "www.gallformers.org"
  PORT = "4000"
  ECTO_IPV6 = "true"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "gallformers_data"
  destination = "/data"
