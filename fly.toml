# Gallformers V2 - Fly.io Configuration (Phoenix)
# Deploy with: fly deploy (from v2/ directory)

app = "gallformers"
primary_region = "iad"

# Graceful shutdown: send SIGTERM and wait for Litestream to flush WAL to S3
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

# Note: release_command doesn't work with SQLite volumes on Fly.io because
# the release machine gets a forked volume snapshot that doesn't persist.
# Migrations are run in docker-entrypoint.sh instead.

[env]
  DATABASE_PATH = "/data/gallformers.sqlite"
  WCVP_DATABASE_PATH = "/data/wcvp.sqlite"
  PHX_HOST = "www.gallformers.org"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "gallformers_data"
  destination = "/data"
